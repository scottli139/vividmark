name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            args: ''
          - platform: ubuntu-22.04
            args: ''
          - platform: windows-latest
            args: ''

    runs-on: ${{ matrix.platform }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Install Rust stable
        uses: dtolnay/rust-action@stable

      - name: Install dependencies (Ubuntu only)
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: Install frontend dependencies
        run: pnpm install --frozen-lockfile

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: 'VividMark ${{ github.ref_name }}'
          releaseBody: |
            ## VividMark ${{ github.ref_name }}

            ### 下载
            请根据您的操作系统选择对应的安装包：

            | 平台 | 文件 | 说明 |
            |------|------|------|
            | macOS | `VividMark_*.dmg` | Universal (Intel & Apple Silicon) |
            | Windows | `VividMark_*_x64-setup.exe` | Windows 10/11 |
            | Linux | `VividMark_*_amd64.deb` / `.AppImage` | Debian/Ubuntu |

            ### 安装说明
            - **macOS**: 下载 `.dmg` 文件，双击打开并拖拽到 Applications 文件夹
            - **Windows**: 下载 `.exe` 文件，双击运行安装程序
            - **Linux**: 下载 `.deb` (Debian/Ubuntu) 或 `.AppImage` (通用)
          releaseDraft: true
          prerelease: false
